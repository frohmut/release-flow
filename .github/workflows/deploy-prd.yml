name: 🚀 Cloud Deployment Pipeline

on:
  push:
    tags:
      - 'v*' # Wakes up for any tag starting with v

jobs:
  determine_target:
    name: 🔍 Scan Tag Type
    runs-on: ubuntu-latest
    outputs:
      # This dynamically evaluates to "Production" if the tag lacks "-rc", otherwise "UAT"
      target_env: ${{ contains(github.ref_name, '-rc') && 'UAT' || 'Production' }}
    steps:
      - run: echo "Target detected as ${{ contains(github.ref_name, '-rc') && 'UAT' || 'Production' }}"

  deploy:
    name: 🏗️ Execute Deploy
    runs-on: ubuntu-latest
    needs: determine_target
    
    # MAGIC HAPPENS HERE: If target_env is "Production", GitHub locks the job 
    # until the Release Manager clicks "Approve" in the Actions UI.
    environment: ${{ needs.determine_target.outputs.target_env }}

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v5

      - name: ☁️ Ship Code to Cloud
        run: |
          echo "Deploying version ${{ github.ref_name }} to environment: ${{ needs.determine_target.outputs.target_env }}"
          # Your actual cloud-native deployment commands go here
