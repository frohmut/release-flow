name: 🚀 Cloud Deployment Pipeline

on:
  push:
    tags:
      - 'v*' # Wakes up for any version tag starting with v

jobs:
  # -------------------------------------------------------------
  # JOB 1: UAT DEPLOYMENT (Instant, No Approvals Required)
  # -------------------------------------------------------------
  deploy_to_uat:
    name: 🧪 Deploy to UAT
    # This job ONLY runs if the tag contains "-rc"
    if: contains(github.ref_name, '-rc')
    runs-on: ubuntu-latest
    environment: uat # Points to your standard UAT environment

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ☁️ Ship to UAT Cloud
        run: |
          echo "Deploying Release Candidate ${{ github.ref_name }} straight to UAT..."
          # Insert your actual UAT cloud deployment commands here

  # -------------------------------------------------------------
  # JOB 2: PRODUCTION DEPLOYMENT (Hard Locked with Approval Gate)
  # -------------------------------------------------------------
  deploy_to_production:
    name: 💰 Deploy to Production
    # This job ONLY runs if the tag DOES NOT contain "-rc"
    if: ${{ !contains(github.ref_name, '-rc') }}
    runs-on: ubuntu-latest
    # CRITICAL: Hardcoded string so GitHub instantly reads it 
    # and locks the job until the Release Manager approves!
    environment: prd 

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ☁️ Ship to Live Production Cloud
        run: |
          echo "Deploying FINAL VERSION ${{ github.ref_name }} to live production servers!"
          # Insert your actual Production cloud deployment commands here
