name: Create Production Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.2.3)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check if running on allowed branch
        if: github.ref_name != 'main'  # <-- Hard restriction
        run: |
          echo "Releases can only be triggered from the 'main' branch!"
          exit 1


      - name: Validate Version Framework
        # This native if: statement checks that it starts with 'v' and contains '-rc'
        if: ${{ !startsWith(github.event.inputs.version, 'v') || !contains(github.event.inputs.version, '-rc') }}
        run: |
          echo "::error title=Invalid Format::Your version string MUST start with 'v' and contain '-rc'!"
          echo "::notice::Expected format example: v1.4.0-rc2"
          exit 1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo do create
